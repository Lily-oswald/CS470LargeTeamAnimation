<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gale-Shapley Algorithm - MVC Implementation</title>
    <link rel="stylesheet" href="src/styles/animations.css">
    <style>
        .config-panel {
            max-width: 1200px;
            margin: 20px auto;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .config-panel h2 {
            font-size: 18px;
            margin-bottom: 16px;
            color: #2c2c2c;
        }
        .config-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 16px;
        }
        .config-section {
            border: 0.5px solid #d3d1c7;
            border-radius: 8px;
            padding: 12px;
            background: #f9f9f9;
        }
        .config-section h3 {
            font-size: 14px;
            margin-bottom: 8px;
            color: #3d3d3a;
        }
        textarea {
            width: 100%;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            padding: 8px;
            border: 0.5px solid #b4b2a9;
            border-radius: 6px;
            resize: vertical;
        }
        .button-group {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 12px;
        }
        .primary-button {
            background: #378add;
            color: white;
            border: none;
        }
        .primary-button:hover {
            background: #2a6cb8;
        }
        .example-buttons {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 12px;
        }
        .example-button {
            background: #f1efe8;
            font-size: 13px;
            padding: 6px 12px;
        }
        .error-message {
            background: #fcebeb;
            color: #a32d2d;
            padding: 12px;
            border-radius: 6px;
            margin-top: 12px;
            display: none;
        }
        .success-message {
            background: #eaf3de;
            color: #3b6d11;
            padding: 12px;
            border-radius: 6px;
            margin-top: 12px;
            display: none;
        }
    </style>
</head>
<body>
    <a href="navigation.html" class="back-button">
        <span class="back-arrow">←</span>
        <span>Back to Home</span>
    </a>
    <div class="config-panel">
        <h2>Configure Gale-Shapley Problem Instance</h2>
        
        <div class="config-grid">
            <div class="config-section">
                <h3>Quick Setup</h3>
                <label style="display: block; margin-bottom: 8px;">
                    Number of proposers/receivers:
                    <input type="number" id="num-people" min="2" max="10" value="4" 
                           style="width: 60px; padding: 6px; border: 0.5px solid #b4b2a9; border-radius: 6px; margin-left: 8px;">
                </label>
                <div class="button-group">
                    <button onclick="generateRandomPreferences()">Generate Random</button>
                    <button onclick="generateWorstCase()">Worst Case (Max Proposals)</button>
                </div>
                
                <h3 style="margin-top: 16px;">Load Examples</h3>
                <div class="example-buttons">
                    <button class="example-button" onclick="loadExample('classic')">Classic Example</button>
                    <button class="example-button" onclick="loadExample('symmetric')">Symmetric Prefs</button>
                    <button class="example-button" onclick="loadExample('reverse')">Reverse Order</button>
                    <button class="example-button" onclick="loadExample('three')">3 People</button>
                    <button class="example-button" onclick="loadExample('six')">6 People</button>
                </div>
            </div>
            
            <div class="config-section">
                <h3>Import/Export</h3>
                <div class="button-group">
                    <button onclick="exportPreferences()">Export to JSON File</button>
                    <button onclick="document.getElementById('import-file').click()">Import from JSON File</button>
                    <input type="file" id="import-file" accept=".json" style="display: none;" onchange="importPreferences(event)">
                </div>
                <p style="font-size: 12px; color: #666; margin-top: 8px;">
                    Export/import allows you to save and share problem instances
                </p>
            </div>
        </div>

        <div class="config-grid">
            <div>
                <h3 style="margin-bottom: 8px;">Proposer Preferences (JSON)</h3>
                <textarea id="proposer-prefs" rows="10">{
  "A": ["W", "X", "Y", "Z"],
  "B": ["X", "W", "Z", "Y"],
  "C": ["W", "X", "Y", "Z"],
  "D": ["Y", "X", "W", "Z"]
}</textarea>
            </div>
            <div>
                <h3 style="margin-bottom: 8px;">Receiver Preferences (JSON)</h3>
                <textarea id="receiver-prefs" rows="10">{
  "W": ["B", "A", "D", "C"],
  "X": ["A", "B", "C", "D"],
  "Y": ["A", "B", "C", "D"],
  "Z": ["A", "B", "C", "D"]
}</textarea>
            </div>
        </div>

        <div class="button-group">
            <button class="primary-button" onclick="useCustomPreferences()">Apply Custom Preferences</button>
            <button onclick="resetToDefault()">Reset to Default</button>
        </div>

        <div id="error-message" class="error-message"></div>
        <div id="success-message" class="success-message"></div>
    </div>

    <div id="app-container"></div>

    <!-- Load modules in order: Utils -> Algorithm -> Model -> View -> Controller -->
    <script src="src/utils/AnimationRenderer.js"></script>
    <script src="src/algorithms/GaleShapley.js"></script>
    <script src="src/models/GaleShapleyModel.js"></script>
    <script src="src/views/GaleShapleyView.js"></script>
    <script src="src/controllers/GaleShapleyController.js"></script>

    <script>
        let controller; // Make controller global

        // Example preference sets
        const examples = {
            classic: {
                proposers: ['A', 'B', 'C', 'D'],
                receivers: ['W', 'X', 'Y', 'Z'],
                proposerPrefs: {
                    'A': ['W', 'X', 'Y', 'Z'],
                    'B': ['X', 'W', 'Z', 'Y'],
                    'C': ['W', 'X', 'Y', 'Z'],
                    'D': ['Y', 'X', 'W', 'Z']
                },
                receiverPrefs: {
                    'W': ['B', 'A', 'D', 'C'],
                    'X': ['A', 'B', 'C', 'D'],
                    'Y': ['A', 'B', 'C', 'D'],
                    'Z': ['A', 'B', 'C', 'D']
                }
            },
            symmetric: {
                proposers: ['A', 'B', 'C', 'D'],
                receivers: ['W', 'X', 'Y', 'Z'],
                proposerPrefs: {
                    'A': ['W', 'X', 'Y', 'Z'],
                    'B': ['X', 'Y', 'Z', 'W'],
                    'C': ['Y', 'Z', 'W', 'X'],
                    'D': ['Z', 'W', 'X', 'Y']
                },
                receiverPrefs: {
                    'W': ['A', 'B', 'C', 'D'],
                    'X': ['B', 'C', 'D', 'A'],
                    'Y': ['C', 'D', 'A', 'B'],
                    'Z': ['D', 'A', 'B', 'C']
                }
            },
            reverse: {
                proposers: ['A', 'B', 'C', 'D'],
                receivers: ['W', 'X', 'Y', 'Z'],
                proposerPrefs: {
                    'A': ['W', 'X', 'Y', 'Z'],
                    'B': ['W', 'X', 'Y', 'Z'],
                    'C': ['W', 'X', 'Y', 'Z'],
                    'D': ['W', 'X', 'Y', 'Z']
                },
                receiverPrefs: {
                    'W': ['D', 'C', 'B', 'A'],
                    'X': ['D', 'C', 'B', 'A'],
                    'Y': ['D', 'C', 'B', 'A'],
                    'Z': ['D', 'C', 'B', 'A']
                }
            },
            three: {
                proposers: ['A', 'B', 'C'],
                receivers: ['X', 'Y', 'Z'],
                proposerPrefs: {
                    'A': ['X', 'Y', 'Z'],
                    'B': ['Y', 'X', 'Z'],
                    'C': ['X', 'Y', 'Z']
                },
                receiverPrefs: {
                    'X': ['B', 'A', 'C'],
                    'Y': ['A', 'B', 'C'],
                    'Z': ['A', 'B', 'C']
                }
            },
            six: {
                proposers: ['A', 'B', 'C', 'D', 'E', 'F'],
                receivers: ['P', 'Q', 'R', 'S', 'T', 'U'],
                proposerPrefs: {
                    'A': ['P', 'Q', 'R', 'S', 'T', 'U'],
                    'B': ['Q', 'P', 'S', 'R', 'U', 'T'],
                    'C': ['P', 'Q', 'R', 'S', 'T', 'U'],
                    'D': ['R', 'S', 'T', 'U', 'P', 'Q'],
                    'E': ['Q', 'R', 'S', 'T', 'U', 'P'],
                    'F': ['P', 'Q', 'R', 'S', 'T', 'U']
                },
                receiverPrefs: {
                    'P': ['B', 'A', 'C', 'D', 'E', 'F'],
                    'Q': ['A', 'B', 'C', 'D', 'E', 'F'],
                    'R': ['C', 'D', 'E', 'F', 'A', 'B'],
                    'S': ['A', 'B', 'C', 'D', 'E', 'F'],
                    'T': ['D', 'E', 'F', 'A', 'B', 'C'],
                    'U': ['A', 'B', 'C', 'D', 'E', 'F']
                }
            }
        };

        function initializeApp(proposers, receivers, proposerPrefs, receiverPrefs) {
            // Clear existing app if it exists
            document.getElementById('app-container').innerHTML = '';

            // Initialize MVC components
            const algorithm = new GaleShapleyAlgorithm(
                proposers, 
                receivers, 
                proposerPrefs, 
                receiverPrefs
            );

            const model = new GaleShapleyModel(algorithm);
            const view = new GaleShapleyView('app-container');
            controller = new GaleShapleyController(model, view);

            window.gsController = controller;
            console.log('Gale-Shapley initialized');
        }

        function showError(message) {
            const errorDiv = document.getElementById('error-message');
            const successDiv = document.getElementById('success-message');
            successDiv.style.display = 'none';
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
            setTimeout(() => {
                errorDiv.style.display = 'none';
            }, 5000);
        }

        function showSuccess(message) {
            const errorDiv = document.getElementById('error-message');
            const successDiv = document.getElementById('success-message');
            errorDiv.style.display = 'none';
            successDiv.textContent = message;
            successDiv.style.display = 'block';
            setTimeout(() => {
                successDiv.style.display = 'none';
            }, 3000);
        }

        function validatePreferences(proposers, receivers, proposerPrefs, receiverPrefs) {
            // Check equal numbers
            if (proposers.length !== receivers.length) {
                throw new Error('Number of proposers must equal number of receivers');
            }

            const n = proposers.length;

            // Check proposer preferences
            for (const p of proposers) {
                if (!proposerPrefs[p]) {
                    throw new Error(`Missing preferences for proposer ${p}`);
                }
                if (proposerPrefs[p].length !== n) {
                    throw new Error(`${p}'s preference list must contain exactly ${n} receivers`);
                }
                // Check all receivers are present
                const prefSet = new Set(proposerPrefs[p]);
                if (prefSet.size !== n) {
                    throw new Error(`${p}'s preference list contains duplicates`);
                }
                for (const r of receivers) {
                    if (!prefSet.has(r)) {
                        throw new Error(`${p}'s preference list is missing receiver ${r}`);
                    }
                }
            }

            // Check receiver preferences
            for (const r of receivers) {
                if (!receiverPrefs[r]) {
                    throw new Error(`Missing preferences for receiver ${r}`);
                }
                if (receiverPrefs[r].length !== n) {
                    throw new Error(`${r}'s preference list must contain exactly ${n} proposers`);
                }
                // Check all proposers are present
                const prefSet = new Set(receiverPrefs[r]);
                if (prefSet.size !== n) {
                    throw new Error(`${r}'s preference list contains duplicates`);
                }
                for (const p of proposers) {
                    if (!prefSet.has(p)) {
                        throw new Error(`${r}'s preference list is missing proposer ${p}`);
                    }
                }
            }
        }

        function useCustomPreferences() {
            try {
                // Parse JSON from textareas
                const proposerPrefs = JSON.parse(document.getElementById('proposer-prefs').value);
                const receiverPrefs = JSON.parse(document.getElementById('receiver-prefs').value);

                // Extract proposers and receivers from the preference objects
                const proposers = Object.keys(proposerPrefs).sort();
                const receivers = Object.keys(receiverPrefs).sort();

                // Validate
                validatePreferences(proposers, receivers, proposerPrefs, receiverPrefs);

                initializeApp(proposers, receivers, proposerPrefs, receiverPrefs);
                showSuccess(`Successfully loaded preferences for ${proposers.length} proposers and ${receivers.length} receivers!`);
            } catch (e) {
                showError('Error: ' + e.message);
            }
        }

        function generateRandomPreferences() {
            const n = parseInt(document.getElementById('num-people').value);
            
            if (n < 2 || n > 10) {
                showError('Please choose between 2 and 10 people');
                return;
            }

            // Generate names
            const proposers = [];
            const receivers = [];
            
            for (let i = 0; i < n; i++) {
                proposers.push(String.fromCharCode(65 + i)); // A, B, C, ...
            }
            
            // Use different starting letters for receivers
            if (n <= 4) {
                for (let i = 0; i < n; i++) {
                    receivers.push(String.fromCharCode(87 + i)); // W, X, Y, Z
                }
            } else {
                for (let i = 0; i < n; i++) {
                    receivers.push(String.fromCharCode(80 + i)); // P, Q, R, S, T, U, V, W, X, Y
                }
            }

            // Generate random preferences
            const proposerPrefs = {};
            const receiverPrefs = {};

            for (const p of proposers) {
                proposerPrefs[p] = shuffleArray([...receivers]);
            }

            for (const r of receivers) {
                receiverPrefs[r] = shuffleArray([...proposers]);
            }

            // Update textareas
            document.getElementById('proposer-prefs').value = JSON.stringify(proposerPrefs, null, 2);
            document.getElementById('receiver-prefs').value = JSON.stringify(receiverPrefs, null, 2);

            // Initialize with new preferences
            initializeApp(proposers, receivers, proposerPrefs, receiverPrefs);
            showSuccess('Generated random preferences for ' + n + ' proposers/receivers!');
        }

        function generateWorstCase() {
            const n = parseInt(document.getElementById('num-people').value);
            
            if (n < 2 || n > 10) {
                showError('Please choose between 2 and 10 people');
                return;
            }

            // Generate names
            const proposers = [];
            const receivers = [];
            
            for (let i = 0; i < n; i++) {
                proposers.push(String.fromCharCode(65 + i));
            }
            
            if (n <= 4) {
                for (let i = 0; i < n; i++) {
                    receivers.push(String.fromCharCode(87 + i));
                }
            } else {
                for (let i = 0; i < n; i++) {
                    receivers.push(String.fromCharCode(80 + i));
                }
            }

            // Worst case: all proposers have same preferences, receivers have reverse
            const proposerPrefs = {};
            const receiverPrefs = {};

            const sameOrder = [...receivers];
            for (const p of proposers) {
                proposerPrefs[p] = [...sameOrder];
            }

            const reverseOrder = [...proposers].reverse();
            for (const r of receivers) {
                receiverPrefs[r] = [...reverseOrder];
            }

            // Update textareas
            document.getElementById('proposer-prefs').value = JSON.stringify(proposerPrefs, null, 2);
            document.getElementById('receiver-prefs').value = JSON.stringify(receiverPrefs, null, 2);

            initializeApp(proposers, receivers, proposerPrefs, receiverPrefs);
            showSuccess('Generated worst-case scenario (maximum proposals: ' + (n * n - n + 1) + ')');
        }

        function loadExample(exampleName) {
            const example = examples[exampleName];
            if (!example) {
                showError('Example not found');
                return;
            }

            document.getElementById('proposer-prefs').value = JSON.stringify(example.proposerPrefs, null, 2);
            document.getElementById('receiver-prefs').value = JSON.stringify(example.receiverPrefs, null, 2);
            document.getElementById('num-people').value = example.proposers.length;

            initializeApp(
                example.proposers,
                example.receivers,
                example.proposerPrefs,
                example.receiverPrefs
            );

            showSuccess('Loaded example: ' + exampleName);
        }

        function resetToDefault() {
            loadExample('classic');
        }

        function exportPreferences() {
            try {
                const proposerPrefs = JSON.parse(document.getElementById('proposer-prefs').value);
                const receiverPrefs = JSON.parse(document.getElementById('receiver-prefs').value);

                const data = {
                    proposerPreferences: proposerPrefs,
                    receiverPreferences: receiverPrefs,
                    metadata: {
                        exportDate: new Date().toISOString(),
                        numPeople: Object.keys(proposerPrefs).length
                    }
                };

                const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'gale-shapley-preferences.json';
                a.click();
                URL.revokeObjectURL(url);

                showSuccess('Preferences exported successfully!');
            } catch (e) {
                showError('Error exporting: ' + e.message);
            }
        }

        function importPreferences(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = JSON.parse(e.target.result);
                    
                    if (!data.proposerPreferences || !data.receiverPreferences) {
                        throw new Error('Invalid file format');
                    }

                    document.getElementById('proposer-prefs').value = JSON.stringify(data.proposerPreferences, null, 2);
                    document.getElementById('receiver-prefs').value = JSON.stringify(data.receiverPreferences, null, 2);

                    const proposers = Object.keys(data.proposerPreferences);
                    const receivers = Object.keys(data.receiverPreferences);

                    validatePreferences(proposers, receivers, data.proposerPreferences, data.receiverPreferences);

                    initializeApp(proposers, receivers, data.proposerPreferences, data.receiverPreferences);
                    showSuccess('Preferences imported successfully!');
                } catch (error) {
                    showError('Error importing file: ' + error.message);
                }
            };
            reader.readAsText(file);
        }

        function shuffleArray(array) {
            const result = [...array];
            for (let i = result.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [result[i], result[j]] = [result[j], result[i]];
            }
            return result;
        }

        // Initialize with default preferences on page load
        document.addEventListener('DOMContentLoaded', function() {
            loadExample('classic');
        });
    </script>
</body>
</html>
