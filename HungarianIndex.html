<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hungarian Algorithm - MVC Implementation</title>
    <link rel="stylesheet" href="src/styles/animations.css">
    <style>
        .config-panel {
            max-width: 1200px;
            margin: 20px auto;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .config-panel h2 {
            font-size: 18px;
            margin-bottom: 16px;
            color: #2c2c2c;
        }

        .config-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 16px;
        }

        .config-section {
            border: 0.5px solid #d3d1c7;
            border-radius: 8px;
            padding: 12px;
            background: #f9f9f9;
        }

        .config-section h3 {
            font-size: 14px;
            margin-bottom: 8px;
            color: #3d3d3a;
        }

        textarea {
            width: 100%;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            padding: 8px;
            border: 0.5px solid #b4b2a9;
            border-radius: 6px;
            resize: vertical;
        }

        .button-group {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 12px;
        }

        .primary-button {
            background: #378add;
            color: white;
            border: none;
        }

        .primary-button:hover {
            background: #2a6cb8;
        }

        .error-message {
            background: #fcebeb;
            color: #a32d2d;
            padding: 12px;
            border-radius: 6px;
            margin-top: 12px;
            display: none;
        }

        .success-message {
            background: #eaf3de;
            color: #3b6d11;
            padding: 12px;
            border-radius: 6px;
            margin-top: 12px;
            display: none;
        }
    </style>
</head>
<body>
    <a href="navigation.html" class="back-button">
        <span class="back-arrow">←</span>
        <span>Back to Home</span>
    </a>

    <div class="config-panel">
        <h2>Configure Hungarian Algorithm (Assignment Problem)</h2>

        <div class="config-grid">
            <div class="config-section">
                <h3>Quick Setup</h3>
                <label style="display: block; margin-bottom: 8px;">
                    Matrix Size:
                    <input
                        type="number"
                        id="matrix-size"
                        min="2"
                        max="6"
                        value="4"
                        style="width: 60px; padding: 6px; border: 0.5px solid #b4b2a9; border-radius: 6px; margin-left: 8px;"
                    >
                </label>

                <div class="button-group">
                    <button onclick="generateRandomMatrix()">Generate Random Matrix</button>
                </div>
            </div>

            <div class="config-section">
                <h3>Matrix Input</h3>
                <p style="font-size: 12px; color: #666; margin-bottom: 8px;">
                    Enter a square cost matrix in JSON format.
                </p>
                <div class="button-group">
                    <button class="primary-button" onclick="useCustomMatrix()">Apply Matrix</button>
                </div>
            </div>
        </div>

        <div>
            <h3 style="margin-bottom: 8px;">Cost Matrix (JSON)</h3>
            <textarea id="matrix-input" rows="10">[
  [9, 2, 7, 8],
  [6, 4, 3, 7],
  [5, 8, 1, 8],
  [7, 6, 9, 4]
]</textarea>
        </div>

        <div id="error-message" class="error-message"></div>
        <div id="success-message" class="success-message"></div>
    </div>

    <div id="app-container"></div>

    <script src="src/utils/AnimationRenderer.js"></script>
    <script src="src/algorithms/Hungarian.js"></script>
    <script src="src/models/HungarianModel.js"></script>
    <script src="src/views/HungarianView.js"></script>
    <script src="src/controllers/HungarianController.js"></script>

    <script>
        let controller;

        function initializeApp(matrix) {
            document.getElementById('app-container').innerHTML = '';

            const algorithm = new HungarianAlgorithm(matrix);
            const model = new HungarianModel(algorithm);
            const view = new HungarianView('app-container');
            controller = new HungarianController(model, view);
        }

        function showError(message) {
            const errorDiv = document.getElementById('error-message');
            const successDiv = document.getElementById('success-message');
            successDiv.style.display = 'none';
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
            setTimeout(() => {
                errorDiv.style.display = 'none';
            }, 5000);
        }

        function showSuccess(message) {
            const errorDiv = document.getElementById('error-message');
            const successDiv = document.getElementById('success-message');
            errorDiv.style.display = 'none';
            successDiv.textContent = message;
            successDiv.style.display = 'block';
            setTimeout(() => {
                successDiv.style.display = 'none';
            }, 3000);
        }

        function validateMatrix(matrix) {
            if (!Array.isArray(matrix) || matrix.length < 2) {
                throw new Error('Matrix must be an array with at least 2 rows.');
            }

            const size = matrix.length;

            for (const row of matrix) {
                if (!Array.isArray(row) || row.length !== size) {
                    throw new Error('Matrix must be square (same number of rows and columns).');
                }

                for (const value of row) {
                    if (typeof value !== 'number' || Number.isNaN(value)) {
                        throw new Error('All matrix entries must be valid numbers.');
                    }
                }
            }
        }

        function useCustomMatrix() {
            try {
                const matrix = JSON.parse(document.getElementById('matrix-input').value);
                validateMatrix(matrix);
                initializeApp(matrix);
                showSuccess(`Loaded a ${matrix.length}x${matrix.length} cost matrix.`);
            } catch (e) {
                showError('Error: ' + e.message);
            }
        }

        function generateRandomMatrix() {
            const size = parseInt(document.getElementById('matrix-size').value);
            const matrix = [];

            for (let i = 0; i < size; i++) {
                const row = [];
                for (let j = 0; j < size; j++) {
                    row.push(Math.floor(Math.random() * 10) + 1);
                }
                matrix.push(row);
            }

            document.getElementById('matrix-input').value =
                '[\n' +
                matrix.map(row => '  [' + row.join(', ') + ']').join(',\n') +
                '\n]';
                
            initializeApp(matrix);
            showSuccess(`Generated a random ${size}x${size} cost matrix.`);
        }

        document.addEventListener('DOMContentLoaded', function() {
            useCustomMatrix();
        });
    </script>
</body>
</html>
